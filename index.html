<!doctype html>
<html lang="pt-br">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>SyntaxWear - Tênis e Sneakers online</title>

    <link rel="stylesheet" href="./css/reset.css">
    <link rel="stylesheet" href="./css/variables.css">
    <link rel="stylesheet" href="./css/base.css">
    <link rel="stylesheet" href="./css/layout.css">

    <link rel="stylesheet" href="./css/components/header.css">
    <link rel="stylesheet" href="./css/components/hero.css">
    <link rel="stylesheet" href="./css/components/product-category.css">

</head>

<body>
    <header class="header">
        <h1 class="logo">
            <a href="/" title="SyntaxWear - Tênis e Sneakers online">
                <img src="imagens/logo/logo.png" alt="SyntaxWear - Tênis e Sneakers online">
            </a>
        </h1>

        <nav class="nav-center" aria-label="Categorias Principais">
            <ul>
                <li><a href="#">Masculino</a></li>
                <li><a href="#">Feminino</a></li>
                <li><a href="#">Outlet</a></li>
            </ul>
        </nav>

        <nav class="nav-right" aria-label="Menu Secundário">
            <ul>
                <li>
                    <a href="#">Nossas lojas</a>
                </li>
                <li>
                    <a href="#">Sobre</a>
                </li>

                <li>
                    <a href="#" class="icon-link" aria-label="Minha conta">
                        <img src="./imagens/icons/user.png" alt="Ícone usuário">
                    </a>
                </li>
                <li>
                    <a href="#" class="icon-link" aria-label="Ajuda">
                        <img src="imagens/icons/help.png" alt="Ícone ajuda">
                    </a>
                </li>
                <li>
                    <a href="#" class="icon-link" aria-label="Carrinho">
                        <img src="imagens/icons/cart.png" alt="Ícone carrinho">
                    </a>
                </li>
            </ul>
        </nav>

    </header>

    <main>
        <section class="hero-section">

            <div class="hero-overlay">
                <div class="hero-content">
                    <span class="hero-subtitle">Kryton One</span>
                    <h2 class="hero-title">Tranforme qualquer passo em presença</h2>

                    <div class="hero-buttons">
                        <a class="btn btn-outline" href="#">Ver modelos</a>
                        <a class="btn btn-filled" href="#">Comprar</a>
                    </div>
                </div>
            </div>
            <section>

                <section class="categories-section">
                        <div class="category-card casual">
                            <a href="#" class="category-link">
                                <span class="overlay"></span>
                                <span class="category-name  btn btn-outline">Casual</span>
                            </a>
                        </div>

                        <div class="category-card esporte">
                            <a href="#" class="category-link">
                                <span class="overlay"></span>
                                <span class="category-name btn btn-outline">Esporte</span>
                            </a>
                        </div>

                        <div class="category-card moderno">
                            <a href="#" class="category-link">
                                <span class="overlay"></span>
                                <span class="category-name  btn btn-outline">Moderno</span>
                            </a>
                        </div>

                        <div class="category-card futurista">
                            <a href="#" class="category-link">
                                <span class="overlay"></span>
                                <span class="category-name  btn btn-outline">Futurista</span>
                            </a>
                        </div>
                </section>

                <section class="featured" aria-label="Featured products">
                    <div class="products-grid" role="list">

                    </div>
                </section>
    </main>

    <footer aria-label="Footer with contact info and links">
        <div class="container footer-inner">
            <div class="footer-contact"></div>
            <nav aria-label="Footer links">
                <ul></ul>
            </nav>
        </div>
    </footer>
</body>

</html>
